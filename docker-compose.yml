# Single-file production stack for Dokploy.
#
# How Dokploy uses this:
#   - Paste env vars into the Dokploy UI; Dokploy writes them to .env next to this file.
#   - Dokploy runs `docker compose up -d --build` from the repo root.
#
# Routing:
#   web and backend join dokploy-network so Dokploy's Traefik can reach them.
#   Add domains in the Dokploy UI (Domains tab) — service `web` port 3000, service `backend` port 8000.
#   db and scheduler stay on the default bridge — never put Postgres on dokploy-network.
#
# When serving over plain HTTP on an IP, set DJANGO_SECURE_SSL_REDIRECT=false
# (otherwise Django 301s every request to https:// and nothing answers).

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 40s

  backend:
    build:
      context: ./backend
      target: prod
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      # Re-pin these so Django always matches the `db` service even if .env drifts.
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    networks:
      - default
      - dokploy-network

  web:
    build:
      context: ./frontend
      target: prod
      args:
        # Baked into the JS bundle at build time — must point at the public API URL the browser sees.
        VITE_API_URL: ${VITE_API_URL}
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      - backend
    networks:
      - default
      - dokploy-network

  scheduler:
    image: alpine:3.19
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      INTERNAL_SCHEDULER_SECRET: ${INTERNAL_SCHEDULER_SECRET}
    command:
      - /bin/sh
      - -c
      - |
          set -eu
          apk add --no-cache curl >/dev/null
          sleep 15
          while true; do
            curl -fsS -X POST "http://backend:8000/api/internal/fire-due-reminders/" \
              -H "X-Internal-Secret: $$INTERNAL_SCHEDULER_SECRET" \
              || echo "[scheduler] tick failed"
            sleep 60
          done

networks:
  dokploy-network:
    external: true

volumes:
  postgres_data:
