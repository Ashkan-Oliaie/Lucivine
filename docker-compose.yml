# Full stack for production / Dokploy — Postgres, Gunicorn, SPA (`serve`), scheduler.
#
# Repo root: this file + `.env` (template `deploy/docker-compose.prod.env`) or the same KEY= values in your host UI.
# Local CLI:
#   docker compose up -d --build
#   docker compose exec backend python manage.py migrate
#
# SPA defaults to http://localhost:${WEB_HTTP_PORT:-3001}, API http://localhost:${BACKEND_HTTP_PORT:-8000}.
# Set FRONTEND_URL=http://localhost:3001 so CORS matches when testing locally (container listens on 3000).
#
# Dokploy / Traefik: `web` + `backend` join bridge network `dokploy-network` (created by Compose if missing —
# same name Dokploy’s Traefik uses). No manual `docker network create`.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # Compose substitutes ${VAR} from the host env — Dokploy often omits POSTGRES_* there,
      # leaving pg_isready with empty -U/-d so health never passes.
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 40s

  backend:
    build:
      context: ./backend
      target: prod
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      # Same interpolation as `db` — overrides env_file so Django always matches Postgres (avoids Dokploy / .env drift).
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${BACKEND_HTTP_PORT:-8000}:8000"
    networks:
      - default
      - dokploy-network
    labels:
      - traefik.docker.network=dokploy-network

  web:
    build:
      context: ./frontend
      target: prod
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    restart: unless-stopped
    ports:
      - "${WEB_HTTP_PORT:-3001}:3000"
    depends_on:
      - backend
    networks:
      - default
      - dokploy-network
    labels:
      - traefik.docker.network=dokploy-network

  scheduler:
    image: alpine:3.19
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      INTERNAL_SCHEDULER_SECRET: ${INTERNAL_SCHEDULER_SECRET:-change-me-scheduler-secret}
    command:
      - /bin/sh
      - -c
      - |
          set -eu
          apk add --no-cache curl >/dev/null
          echo "[scheduler] firing due reminders every 60s"
          sleep 15
          while true; do
            curl -fsS -X POST "http://backend:8000/api/internal/fire-due-reminders/" \
              -H "X-Internal-Secret: $$INTERNAL_SCHEDULER_SECRET" \
              || echo "[scheduler] tick failed"
            sleep 60
          done

volumes:
  postgres_data:

networks:
  dokploy-network:
    name: dokploy-network
    driver: bridge
