# Full stack for production / Dokploy — Postgres, Gunicorn, SPA (`serve`), scheduler.
#
# Dokploy: set this file as the Compose path (usually repo root `docker-compose.yml`).
# Provide env vars in Dokploy UI or a `.env` file — especially POSTGRES_*, DJANGO_SECRET_KEY,
# DJANGO_ALLOWED_HOSTS, FRONTEND_URL, VITE_API_URL (must match public API URL clients use).
#
# Local CLI:
#   docker compose up -d --build
#   docker compose exec backend python manage.py migrate
#
# SPA defaults to http://localhost:${WEB_HTTP_PORT:-3000}, API http://localhost:${BACKEND_HTTP_PORT:-8000}.
# Set FRONTEND_URL=http://localhost:3000 so CORS matches when testing locally.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      target: prod
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${BACKEND_HTTP_PORT:-8000}:8000"

  web:
    build:
      context: ./frontend
      target: prod
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    restart: unless-stopped
    ports:
      - "${WEB_HTTP_PORT:-3000}:3000"
    depends_on:
      - backend

  scheduler:
    image: alpine:3.19
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      INTERNAL_SCHEDULER_SECRET: ${INTERNAL_SCHEDULER_SECRET:-change-me-scheduler-secret}
    command:
      - /bin/sh
      - -c
      - |
          set -eu
          apk add --no-cache curl >/dev/null
          echo "[scheduler] firing due reminders every 60s"
          sleep 15
          while true; do
            curl -fsS -X POST "http://backend:8000/api/internal/fire-due-reminders/" \
              -H "X-Internal-Secret: $$INTERNAL_SCHEDULER_SECRET" \
              || echo "[scheduler] tick failed"
            sleep 60
          done

volumes:
  postgres_data:
