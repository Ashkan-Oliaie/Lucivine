services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 40s

  backend:
    build:
      context: ./backend
      target: dev
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: dev
    command: npm run dev -- --host 0.0.0.0
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      # Used by vite.config.ts dev proxy only (hostname `backend` resolves inside this network).
      VITE_PROXY_BACKEND: http://backend:8000
    depends_on:
      - backend

  # Calls fire-due-reminders frequently so pushes fire soon after next_fire_at (still polled,
  # not second-perfect — align cron frequency similarly in prod).
  scheduler:
    image: alpine:3.19
    restart: unless-stopped
    depends_on:
      - backend
    env_file: .env
    environment:
      INTERNAL_SCHEDULER_SECRET: ${INTERNAL_SCHEDULER_SECRET:-dev-scheduler-secret}
    command:
      - /bin/sh
      - -c
      - |
          set -eu
          apk add --no-cache curl >/dev/null
          echo "[scheduler] ticking fire-due-reminders every 15s"
          sleep 12
          while true; do
            curl -fsS -X POST "http://backend:8000/api/internal/fire-due-reminders/" \
              -H "X-Internal-Secret: $$INTERNAL_SCHEDULER_SECRET" \
              || echo "[scheduler] tick failed"
            sleep 15
          done

volumes:
  postgres_data:
  frontend_node_modules:
