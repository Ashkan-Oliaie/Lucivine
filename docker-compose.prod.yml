# Production stack — single host: nginx (SPA + reverse proxy to Django), Postgres, scheduler.
# Usage:
#   cp .env.example .env   # set DJANGO_SECRET_KEY, POSTGRES_*, DJANGO_ALLOWED_HOSTS, FRONTEND_URL, etc.
#   docker compose -f docker-compose.prod.yml up -d --build
#   docker compose -f docker-compose.prod.yml exec backend python manage.py migrate
#
# Bind HTTP on port 80; put TLS in front (Caddy, Traefik, Cloudflare) or terminate HTTPS on the host.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      target: prod
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./frontend
      target: prod
    restart: unless-stopped
    ports:
      - "${WEB_HTTP_PORT:-80}:80"
    depends_on:
      - backend

  scheduler:
    image: alpine:3.19
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      INTERNAL_SCHEDULER_SECRET: ${INTERNAL_SCHEDULER_SECRET:-change-me-scheduler-secret}
    command:
      - /bin/sh
      - -c
      - |
          set -eu
          apk add --no-cache curl >/dev/null
          echo "[scheduler] firing due reminders every 60s"
          sleep 15
          while true; do
            curl -fsS -X POST "http://backend:8000/api/internal/fire-due-reminders/" \
              -H "X-Internal-Secret: $$INTERNAL_SCHEDULER_SECRET" \
              || echo "[scheduler] tick failed"
            sleep 60
          done

volumes:
  postgres_data:
